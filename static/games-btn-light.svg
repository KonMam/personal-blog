<svg xmlns="http://www.w3.org/2000/svg" width="88" height="31" shape-rendering="crispEdges">
  <defs>
    <pattern id="bg" x="0" y="0" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#0a0f2e"/>
      <rect x="0" y="0" width="1" height="1" fill="#0e1438"/>
      <rect x="1" y="1" width="1" height="1" fill="#0e1438"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="88" height="31" fill="url(#bg)"/>

  <!-- Outer border: steel blue -->
  <rect x="0" y="0" width="88" height="31" fill="none" stroke="#4466cc" stroke-width="1"/>
  <!-- Inner border -->
  <rect x="2" y="2" width="84" height="27" fill="none" stroke="#1a2a5e" stroke-width="1"/>

  <!-- Corner jewels: silver -->
  <rect x="1" y="1" width="2" height="2" fill="#aabbee"/>
  <rect x="85" y="1" width="2" height="2" fill="#aabbee"/>
  <rect x="1" y="28" width="2" height="2" fill="#aabbee"/>
  <rect x="85" y="28" width="2" height="2" fill="#aabbee"/>

  <!-- Left zone -->
  <rect x="3" y="3" width="22" height="25" fill="#070c28"/>

  <!-- Pixel sword in silver/blue -->
  <rect x="12" y="4"  width="2" height="1" fill="#ddeeff"/>
  <rect x="12" y="5"  width="2" height="12" fill="#aabbee"/>
  <rect x="12" y="5"  width="1" height="12" fill="#ddeeff"/>
  <rect x="7"  y="17" width="10" height="2" fill="#aabbee"/>
  <rect x="7"  y="17" width="10" height="1" fill="#ddeeff"/>
  <rect x="12" y="19" width="2" height="5"  fill="#445588"/>
  <rect x="10" y="24" width="5"  height="2" fill="#aabbee"/>

  <!-- Zone separator -->
  <line x1="26" y1="3" x2="26" y2="28" stroke="#4466cc" stroke-width="1"/>

  <!-- Right zone -->
  <rect x="27" y="3" width="58" height="25" fill="#060b26"/>

  <!-- GAMES in white -->
  <text x="56" y="15"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="9"
        font-weight="bold"
        fill="#ddeeff"
        letter-spacing="1.5">GAMES</text>

  <!-- Divider -->
  <line x1="29" y1="19" x2="83" y2="19" stroke="#1a2a5e" stroke-width="1"/>

  <!-- Sub label -->
  <text x="56" y="27"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="5"
        fill="#7799cc"
        letter-spacing="0.5">&#x2605; NEW &#x2605;</text>
</svg>
